name: ida-mcp
version: '9.4.0'
summary: Headless IDA Pro MCP Server for AI-powered binary analysis
description: |
  ida-mcp exposes IDA Pro's analysis engine over the Model Context Protocol,
  letting AI assistants disassemble, decompile, and inspect binaries through
  a headless idalib session.

  **Requires a licensed IDA Pro 9.x installation in your home directory.**
  This snap does not bundle IDA — it links against libida.so from your
  existing install. The installer default ~/ida-pro-9.4 is auto-detected;
  for custom paths under $HOME set IDADIR. Installs outside $HOME (e.g.
  /opt/ida-pro-9.4) are not accessible under strict confinement — use
  Homebrew or Nix for those.

license: MIT
source-code: https://github.com/blacktop/ida-mcp-rs
issues: https://github.com/blacktop/ida-mcp-rs/issues
contact: https://github.com/blacktop/ida-mcp-rs/issues

base: core24
grade: stable
# Strict confinement with home interface: ida-mcp links against libida.so
# from ~/ida-pro-9.4 (the installer default). Users with IDA outside $HOME
# need Homebrew/Nix instead.
confinement: strict

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]
  arm64:
    build-on: [arm64]
    build-for: [arm64]

apps:
  ida-mcp:
    command: bin/ida-mcp
    plugs:
      - home          # ~/ida-pro-9.4/libida.so and IDB files
      - dot-idapro    # ~/.idapro/ (IDA license + config; dotfiles need personal-files)
      - network       # MCP over HTTP (serve-http subcommand)
      - network-bind  # listen on a port in serve-http mode

plugs:
  dot-idapro:
    interface: personal-files
    write:
      - $HOME/.idapro

parts:
  ida-mcp:
    plugin: dump
    source: .
    build-packages:
      - curl
    override-pull: |
      case "${CRAFT_ARCH_BUILD_FOR}" in
        amd64) tarball_arch=x86_64 ;;
        arm64) tarball_arch=arm64 ;;
        *) echo "unsupported arch: ${CRAFT_ARCH_BUILD_FOR}" >&2; exit 1 ;;
      esac
      url="https://github.com/blacktop/ida-mcp-rs/releases/download/v${SNAPCRAFT_PROJECT_VERSION}/ida-mcp_${SNAPCRAFT_PROJECT_VERSION}_Linux_${tarball_arch}.tar.gz"
      curl -fsSL "${url}" | tar -xz
    organize:
      ida-mcp: bin/ida-mcp
      ida-mcp-bin: bin/ida-mcp-bin
    stage:
      - bin/ida-mcp
      - bin/ida-mcp-bin
