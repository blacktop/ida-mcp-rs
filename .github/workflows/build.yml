# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    if: ${{ !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'rc') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-24.04
            idadir: /opt/idapro-9.4
            cargo_args: ""
            artifact_name: ida-mcp-linux-x86_64
            artifact_path: target/release/ida-mcp
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            idadir: /opt/idapro-9.4
            cargo_args: ""
            artifact_name: ida-mcp-linux-arm64
            artifact_path: target/release/ida-mcp
          - os: macos
            arch: x86_64
            runner: macos-15-intel
            idadir: /Applications/IDA Professional 9.4.app/Contents/MacOS
            cargo_args: ""
            artifact_name: ida-mcp-macos-x86_64
            artifact_path: target/release/ida-mcp
          - os: macos
            arch: arm64
            runner: macos-15
            idadir: /Applications/IDA Professional 9.4.app/Contents/MacOS
            cargo_args: ""
            artifact_name: ida-mcp-macos-arm64
            artifact_path: target/release/ida-mcp
          - os: windows
            arch: x86_64
            runner: windows-2025
            idadir: C:\Program Files\IDA Professional 9.4
            cargo_args: ""
            artifact_name: ida-mcp-windows-x86_64
            artifact_path: target/release/ida-mcp.exe
          - os: windows
            arch: arm64
            runner: windows-2025
            idadir: C:\Program Files\IDA Professional 9.4
            cargo_args: --target aarch64-pc-windows-msvc
            artifact_name: ida-mcp-windows-arm64
            artifact_path: target/aarch64-pc-windows-msvc/release/ida-mcp.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Install LLVM
        if: matrix.os == 'windows'
        uses: KyleMayes/install-llvm-action@ebc0426251bc40c7cd31162802432c68818ab8f0  # v2
        with:
          version: "20"
          directory: "${{ runner.temp }}/llvm-20"

      - name: Configure LLVM environment
        if: matrix.os == 'windows'
        shell: pwsh
        run: echo "LIBCLANG_PATH=$((gcm clang).source -replace "clang.exe")" >> $env:GITHUB_ENV

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable

      - name: Install Windows ARM64 target
        if: matrix.os == 'windows' && matrix.arch == 'arm64'
        run: rustup target add aarch64-pc-windows-msvc

      - name: Build Linux
        if: matrix.os == 'linux'
        env:
          IDADIR: ${{ matrix.idadir }}
          CC_ENABLE_DEBUG_OUTPUT: "1"
        run: cargo build --release --locked -vv

      - name: Build Non-Linux
        if: matrix.os != 'linux'
        env:
          IDADIR: ${{ matrix.idadir }}
        run: cargo build --release --locked ${{ matrix.cargo_args }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'rc')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Package artifacts
        run: just ci-package-artifacts

      - name: Generate checksums
        run: just ci-generate-checksums

      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/checksums.txt
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
